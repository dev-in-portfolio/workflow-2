name: apply-live-strategy-alignment

on:
  push:
    branches:
      - fix/live-momentum-strategy-alignment
    paths:
      - scripts/apply-live-strategy-alignment.js
      - .github/workflows/apply-live-strategy-alignment.yml

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/live-momentum-strategy-alignment
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply deterministic patch
        run: node scripts/apply-live-strategy-alignment.js

      - name: Install
        run: npm install

      - name: Run complete CI suite
        run: npm run ci

      - name: Commit repaired implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align live scanner with momentum strategy"
          git push origin HEAD:fix/live-momentum-strategy-alignment

# Triggered after the workflow existed on the repair branch.
