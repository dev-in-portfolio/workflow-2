name: ci

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply one-time strategy repair
        if: hashFiles('scripts/apply-live-strategy-alignment.js') != ''
        run: node scripts/apply-live-strategy-alignment.js

      - name: Install
        run: npm install

      - name: Test
        run: npm run ci

      - name: Commit repaired implementation
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            exit 0
          fi
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align live scanner with momentum strategy"
          git push origin HEAD:${{ github.head_ref }}
