name: ci

on:
  push:
  pull_request:

concurrency:
  group: strategy-repair-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Normalize checkout line endings
        shell: bash
        run: |
          git config core.autocrlf false
          git reset --hard HEAD

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply one-time strategy repair
        id: strategy_patch
        if: hashFiles('scripts/apply-live-strategy-alignment.js') != ''
        continue-on-error: true
        shell: pwsh
        run: |
          node scripts/apply-live-strategy-alignment.js *> patch-output.txt
          if ($LASTEXITCODE -eq 0) {
            node scripts/apply-live-strategy-alignment-cleanups.js *>> patch-output.txt
          }
          if ($LASTEXITCODE -ne 0) {
            Get-Content patch-output.txt
            exit $LASTEXITCODE
          }
          Remove-Item patch-error.txt -ErrorAction SilentlyContinue
          Remove-Item test-error.txt -ErrorAction SilentlyContinue
          Remove-Item patch-output.txt -ErrorAction SilentlyContinue

      - name: Publish repair diagnostics
        if: steps.strategy_patch.outcome == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          git fetch origin "${{ github.head_ref }}" --depth=1
          git switch -C "${{ github.head_ref }}" "origin/${{ github.head_ref }}"
          git config core.autocrlf false
          git reset --hard HEAD
          {
            node scripts/apply-live-strategy-alignment.js
            node scripts/apply-live-strategy-alignment-cleanups.js
          } > patch-error.txt 2>&1 || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add patch-error.txt
          git commit -m "Record strategy repair diagnostic" || true
          git push origin HEAD:${{ github.head_ref }}
          exit 1

      - name: Install
        if: steps.strategy_patch.outcome != 'failure'
        run: npm install

      - name: Test
        id: test_suite
        if: steps.strategy_patch.outcome != 'failure'
        continue-on-error: true
        shell: pwsh
        run: |
          npm run ci *> test-output.txt
          Copy-Item test-output.txt "$env:RUNNER_TEMP/test-output.txt"
          if ($LASTEXITCODE -ne 0) {
            Get-Content test-output.txt
            exit $LASTEXITCODE
          }
          Remove-Item test-output.txt -ErrorAction SilentlyContinue

      - name: Publish test diagnostics
        if: steps.test_suite.outcome == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          git fetch origin "${{ github.head_ref }}" --depth=1
          git switch -C "${{ github.head_ref }}" "origin/${{ github.head_ref }}"
          cp "$RUNNER_TEMP/test-output.txt" test-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test-error.txt
          git commit -m "Record strategy repair test diagnostic" || true
          git push origin HEAD:${{ github.head_ref }}
          exit 1

      - name: Commit repaired implementation
        if: steps.strategy_patch.outcome != 'failure' && steps.test_suite.outcome != 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            exit 0
          fi
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align live scanner with momentum strategy"
          git push origin HEAD:${{ github.head_ref }}
