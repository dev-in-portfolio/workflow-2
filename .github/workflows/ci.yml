name: ci

on:
  pull_request:

concurrency:
  group: strategy-repair-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          show-progress: false

      - name: Normalize checkout line endings
        shell: bash
        run: |
          git config core.autocrlf false
          git reset --hard HEAD

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply one-time strategy repair
        shell: pwsh
        run: |
          node scripts/apply-live-strategy-alignment.js
          node scripts/apply-live-strategy-alignment-cleanups.js

      - name: Install
        run: npm install

      - name: Run complete CI suite
        run: npm run ci

      - name: Commit repaired implementation
        shell: bash
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align live scanner with momentum strategy"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
